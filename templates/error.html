<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} - Vehicle Service Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card login-card fade-in" style="text-align: center;">

            <div style="font-size: 4rem; margin-bottom: 1rem;">
                {% if error_code == 404 %}
                    🔍
                {% else %}
                    ⚠️
                {% endif %}
            </div>

            <h1 class="card-header" style="text-align: center; justify-content: center; font-size: 3rem; margin-bottom: 0.5rem;">{{ error_code }}</h1>
            <h2 style="color: #475569; font-weight: 600; margin-bottom: 1rem;">{{ error_title }}</h2>
            <p style="color: #64748b; margin-bottom: 2rem;">{{ error_message }}</p>

            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                {% if session.get('user_id') %}
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="display: inline-block; width: auto; padding: 0.75rem 2rem;">Go to Dashboard</a>
                {% endif %}
                <a href="{{ url_for('login') }}" class="btn btn-primary" style="display: inline-block; width: auto; padding: 0.75rem 2rem; background: #64748b;">Go to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
