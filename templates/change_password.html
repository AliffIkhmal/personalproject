<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Vehicle Service Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background: linear-gradient(rgba(15, 12, 41, 0.4), rgba(48, 43, 99, 0.4)),
                         url('{{ url_for("static", filename="car-repair-maintenance-theme.jpg") }}')
                         center / cover no-repeat fixed !important;
        }
    </style>
    <!-- Animated Background Bubbles -->
    <div class="bg-bubbles">
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
        <div class="bubble"><div class="dot"></div></div>
    </div>

    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="card login-card fade-in">

            <h1 class="card-header" style="text-align: center; justify-content: center;">Change Password</h1>
            <p class="login-subtitle">Update your account password</p>

            <!-- Show flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('change_password') }}">
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="current_password" class="form-input" placeholder="Enter your current password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-input" placeholder="Enter new password" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-input" placeholder="Re-enter new password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary">Change Password</button>
            </form>

            <div class="login-footer">
                <p><a href="{{ url_for('dashboard') }}" style="color: #667eea; text-decoration: none; font-weight: 600;">Back to Dashboard</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
